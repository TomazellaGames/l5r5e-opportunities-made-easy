name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          jq --arg ver "${{ steps.version.outputs.VERSION }}" '.version = $ver' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Create zip
        run: |
          zip -r l5r5e-opportunities-made-easy.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: |
            l5r5e-opportunities-made-easy.zip
            module.json
